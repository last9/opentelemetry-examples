apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruby-k8s-demo
  namespace: demo
  labels:
    app.kubernetes.io/name: ruby-k8s-demo
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ruby-k8s-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ruby-k8s-demo
        app.kubernetes.io/version: "1.0.0"
    spec:
      containers:
        - name: app
          image: ruby-k8s-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4567
          env:
            # OTel service identity
            - name: OTEL_SERVICE_NAME
              value: ruby-k8s-demo
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.demo.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf

            # Downward API — fieldRef values
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: K8S_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: K8S_SERVICE_ACCOUNT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            # Labels via fieldRef — quoted fieldPath syntax
            - name: K8S_DEPLOYMENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/name']
            - name: K8S_APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']

            # Hardcoded — cannot come from Downward API
            - name: K8S_CLUSTER_NAME
              value: kind-local
            - name: K8S_CONTAINER_NAME
              value: app

            # Compose OTEL_RESOURCE_ATTRIBUTES — SDK reads this automatically
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: >-
                k8s.cluster.name=$(K8S_CLUSTER_NAME),
                k8s.namespace.name=$(K8S_NAMESPACE_NAME),
                k8s.node.name=$(K8S_NODE_NAME),
                k8s.pod.name=$(K8S_POD_NAME),
                k8s.pod.uid=$(K8S_POD_UID),
                k8s.pod.ip=$(K8S_POD_IP),
                k8s.container.name=$(K8S_CONTAINER_NAME),
                k8s.deployment.name=$(K8S_DEPLOYMENT_NAME),
                host.ip=$(K8S_HOST_IP),
                service.version=$(K8S_APP_VERSION),
                service.namespace=$(K8S_NAMESPACE_NAME),
                service.instance.id=$(K8S_NAMESPACE_NAME).$(K8S_POD_NAME).$(K8S_CONTAINER_NAME),
                deployment.environment=local

          readinessProbe:
            httpGet:
              path: /health
              port: 4567
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4567
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ruby-k8s-demo
  namespace: demo
spec:
  selector:
    app.kubernetes.io/name: ruby-k8s-demo
  ports:
    - port: 4567
      targetPort: 4567
