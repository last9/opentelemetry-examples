worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/openresty.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Shared dictionary for lua-resty-prometheus (across all workers)
    lua_shared_dict prometheus_metrics 10m;

    # Add the lua directory to the Lua package path
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;;";

    # Initialize metrics counters once per worker process
    init_worker_by_lua_block {
        require("metrics_init").init()
    }

    # Structured JSON log format — trace_id is included to correlate logs with traces
    log_format json_combined escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referer":"$http_referer",'
        '"trace_id":"$http_x_trace_id"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    include /etc/nginx/conf.d/*.conf;
}
