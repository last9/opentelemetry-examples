services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: java8test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holdingdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: java8test-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --mode dev-container
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: java8test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  aerospike:
    image: aerospike/aerospike-server:7.0.0.4
    container_name: java8test-aerospike
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    healthcheck:
      test: ["CMD", "asd", "--version"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Test 1: Java 8 JVM — agent should print "Requires Java 11+" and skip instrumentation ──

  java8-test:
    image: amazoncorretto:8-alpine
    ports:
      - "8081:8080"
    volumes:
      - ./target:/app
    working_dir: /app
    command: >
      java
      -javaagent:vertx3-otel-agent.jar
      -jar vertx3-java8-agent-test-1.0.0.jar
    environment:
      PORT: "8080"
      OTEL_SERVICE_NAME: java8-test-service
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
      OTEL_EXPORTER_OTLP_HEADERS: ""
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      AEROSPIKE_HOST: aerospike
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mysql:
        condition: service_healthy
      aerospike:
        condition: service_started

  # ── Test 2: Java 11 JVM — agent should instrument and export via OkHttp sender ──

  java11-test:
    image: eclipse-temurin:11-jre-alpine
    ports:
      - "8082:8080"
    volumes:
      - ./target:/app
    working_dir: /app
    command: >
      java
      -javaagent:vertx3-otel-agent.jar
      -jar vertx3-java8-agent-test-1.0.0.jar
    environment:
      PORT: "8080"
      OTEL_SERVICE_NAME: java11-test-service
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
      OTEL_EXPORTER_OTLP_HEADERS: ""
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      AEROSPIKE_HOST: aerospike
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      mysql:
        condition: service_healthy
      aerospike:
        condition: service_started
