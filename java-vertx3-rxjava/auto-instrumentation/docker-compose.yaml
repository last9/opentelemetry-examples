version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vertx3-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holdingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: vertx3-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - LAST9_OTLP_ENDPOINT=${LAST9_OTLP_ENDPOINT}
      - LAST9_OTLP_AUTH_HEADER=${LAST9_OTLP_AUTH_HEADER}
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-demo}

  # Pricing Service
  pricing-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vertx3-pricing-service
    command: ["com.example.pricing.PricingVerticle"]
    environment:
      APP_PORT: "8081"
      OTEL_SERVICE_NAME: pricing-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=demo,service.version=1.0.0
    ports:
      - "8081:8081"
    depends_on:
      - otel-collector

  # Holding Service (Main Application)
  holding-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vertx3-holding-service
    environment:
      APP_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: holdingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PRICING_SERVICE_URL: http://pricing-service:8081
      OTEL_SERVICE_NAME: holding-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=demo,service.version=1.0.0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      pricing-service:
        condition: service_started

volumes:
  postgres_data:
