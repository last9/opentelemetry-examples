receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

  resource:
    attributes:
      - key: deployment.environment
        value: ${DEPLOYMENT_ENV:-demo}
        action: upsert

exporters:
  # Debug exporter (uncomment for local debugging)
  # debug:
  #   verbosity: detailed

  # Last9 OTLP exporter
  otlphttp/last9:
    endpoint: ${LAST9_OTLP_ENDPOINT}
    headers:
      Authorization: ${LAST9_OTLP_AUTH_HEADER}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/last9]

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/last9]
