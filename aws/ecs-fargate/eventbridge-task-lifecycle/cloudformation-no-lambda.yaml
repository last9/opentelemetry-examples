AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Forwards ECS task stop events directly to Last9 via EventBridge API Destination.
  No Lambda required — EventBridge posts the event JSON straight to Last9's
  HTTP log ingestion endpoint using a 2-line input transformer.

  Deployment: aws cloudformation deploy \
    --template-file cloudformation-no-lambda.yaml \
    --stack-name last9-ecs-lifecycle-simple \
    --parameter-overrides \
        Last9Host=<your-host>.last9.io \
        Last9Username=<username> \
        Last9Password=<password> \
    --capabilities CAPABILITY_NAMED_IAM

  After deployment, ECS stop events appear in Last9 Logs Explorer.
  Filter by:  event.source = "aws.ecs"  (from the JSON body's source field)
  Or search:  stoppedReason

Parameters:
  Last9Host:
    Type: String
    Description: >
      Last9 log ingestion hostname (without scheme).
      Find this in Last9 → Integrations → Send Data → the host part of your write URL.
    AllowedPattern: '^[a-zA-Z0-9._-]+$'

  Last9Username:
    Type: String
    Description: Last9 write username (from Integrations → Send Data).

  Last9Password:
    Type: String
    NoEcho: true
    Description: Last9 write password (from Integrations → Send Data).

  ServiceName:
    Type: String
    Default: ecs-lifecycle
    Description: >
      service_name tag applied to all ECS lifecycle log entries in Last9.
      Use this to find events in the Logs Explorer.

  ECSClusterArn:
    Type: String
    Default: ''
    Description: >
      Optional: ARN of a specific ECS cluster to monitor.
      Leave empty to capture stop events from ALL clusters in this region.

Conditions:
  FilterByCluster: !Not [!Equals [!Ref ECSClusterArn, '']]

Resources:

  # ── EventBridge API Destination ───────────────────────────────────────────
  #
  # API Destinations let EventBridge POST directly to an HTTP endpoint.
  # The Connection holds credentials; the Destination holds the URL + method.

  Last9Connection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub 'last9-log-ingest-${AWS::StackName}'
      Description: Basic auth connection to Last9 log ingestion endpoint
      AuthorizationType: BASIC
      AuthParameters:
        BasicAuthParameters:
          Username: !Ref Last9Username
          Password: !Ref Last9Password

  Last9Destination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub 'last9-ecs-lifecycle-${AWS::StackName}'
      Description: >
        Posts ECS task stop events to Last9 HTTP log ingestion endpoint.
      ConnectionArn: !GetAtt Last9Connection.Arn
      # /json/v2 accepts a JSON array of log objects.
      # service_name query param tags all logs with this service in Last9.
      InvocationEndpoint: !Sub 'https://${Last9Host}/json/v2?service_name=${ServiceName}'
      HttpMethod: POST
      # EventBridge rate-limits API destination invocations.
      # 300/s is the max — more than enough for ECS lifecycle events.
      InvocationRateLimitPerSecond: 300

  # IAM role that allows EventBridge to invoke the API destination.
  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'last9-eventbridge-invoke-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt Last9Destination.Arn

  # ── EventBridge Rule ─────────────────────────────────────────────────────

  ECSTaskStopRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'last9-ecs-task-stopped-${AWS::StackName}'
      Description: >
        Captures ECS task stop events and posts them to Last9.
      EventPattern:
        source:
          - aws.ecs
        detail-type:
          - ECS Task State Change
        detail:
          lastStatus:
            - STOPPED
        resources: !If
          - FilterByCluster
          - - prefix: !Ref ECSClusterArn
          - !Ref AWS::NoValue
      State: ENABLED
      Targets:
        - Id: Last9LogIngestion
          Arn: !GetAtt Last9Destination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          # Input transformer: extract the ECS event detail and wrap it in a
          # JSON array — the format Last9's /json/v2 endpoint expects.
          #
          # $.detail contains the full ECS task stop payload:
          #   taskArn, clusterArn, lastStatus, stopCode, stoppedReason,
          #   stoppedAt, containers[].exitCode, containers[].reason, etc.
          #
          # The input transformer produces: [{"taskArn":"...","stopCode":"...",...}]
          InputTransformer:
            InputPathsMap:
              detail: '$.detail'
            InputTemplate: '[<detail>]'

Outputs:
  ApiDestinationArn:
    Description: EventBridge API Destination ARN
    Value: !GetAtt Last9Destination.Arn

  EventBridgeRuleName:
    Description: EventBridge rule capturing ECS task stop events
    Value: !Ref ECSTaskStopRule

  LogsExplorerFilter:
    Description: Filter to use in Last9 Logs Explorer to find ECS lifecycle events
    Value: !Sub 'service_name = "${ServiceName}"'

  CorrelationKey:
    Description: >
      The taskArn field in log body correlates to aws_ecs_task_arn label in ECS metrics.
      In Last9 Logs search for a specific task: taskArn = "arn:aws:ecs:..."
    Value: taskArn (log body field) ↔ aws_ecs_task_arn (metric label)
