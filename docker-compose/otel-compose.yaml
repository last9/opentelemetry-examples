services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.144.0
    container_name: otel-collector
    command:
      [
        "--config=/etc/otel-collector-config.yaml",
        "--feature-gates=transform.flatten.logs"
      ]
    volumes:
      - ./otel-config.yaml:/etc/otel-collector-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_logs:/var/log/nginx
      # Host filesystem mounts so the hostmetrics receiver can read the VM's
      # CPU / memory / disk / network / process stats rather than the
      # collector container's own (containerized) view.
      - /:/hostfs:ro,rslave
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    restart: on-failure
    user: "0" # root user to access docker stats + /proc
    pid: host # required so the process scraper can see host PIDs
    environment:
      - LOGSPOUT=ignore
      - LAST9_OTLP_ENDPOINT=${LAST9_OTLP_ENDPOINT}
      - LAST9_OTLP_AUTH_HEADER=${LAST9_OTLP_AUTH_HEADER}
      - HOST_PROC=/hostfs/proc
      - HOST_SYS=/hostfs/sys
      - HOST_ETC=/hostfs/etc
    networks:
      - otel_network
      # Attach to each sample app's network so the prometheus receiver can
      # actively scrape sidecar exporters running inside those containers.
      # Required only for active-scrape receivers (prometheus, redis,
      # postgresql, httpcheck, ...) — docker_stats + logspout do not need
      # this because they read via the Docker socket.
      - nginx_network
      - apache_network
      # Note: bridge networking is required here for active prometheus scraping
      # of named docker networks. For scraping host-networked containers
      # (network_mode: host), switch to network_mode: host on this service,
      # remove the networks: block, use localhost:<port> as scrape target,
      # and change logspout command to syslog+tcp://localhost:2255.

  logspout:
    image: "gliderlabs/logspout:v3.2.14"
    container_name: logspout
    volumes:
      - /etc/hostname:/etc/host_hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: syslog+tcp://otel-collector:2255
    depends_on:
      - otel-collector
    restart: on-failure
    networks:
      - nginx_network
      - apache_network
      - otel_network

networks:
  nginx_network:
    external: true
    name: nginx_network
  apache_network:
    external: true
    name: apache_network
  otel_network:
    name: otel_network

volumes:
  nginx_logs:
    external: true
    name: nginx_logs
