receivers:
  # Receives JMX metrics from the opentelemetry-jmx-metrics sidecar (Docker)
  # For bare-metal: use the jmxreceiver directly (see README)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu:
        metrics:
          system.cpu.logical.count:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.limit:
            enabled: true
      load:
      disk:
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      network:
      paging:

processors:
  batch:
    timeout: 5s
    send_batch_size: 10000
    send_batch_max_size: 10000
  resourcedetection/system:
    detectors: ["system"]
    system:
      hostname_sources: ["os"]
  transform/add_db_system:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["host.name"], resource.attributes["host.name"])
          - set(attributes["db.system"], "cassandra")

exporters:
  otlp/last9:
    endpoint: "${env:OTEL_EXPORTER_OTLP_ENDPOINT}"
    headers:
      "Authorization": "${env:OTEL_EXPORTER_OTLP_HEADERS_AUTHORIZATION}"
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics/jmx:
      receivers: [otlp]
      processors: [batch, transform/add_db_system]
      exporters: [otlp/last9, debug]
    metrics/host:
      receivers: [hostmetrics]
      processors: [batch, resourcedetection/system, transform/add_db_system]
      exporters: [otlp/last9, debug]
