---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: "argo-rollouts"
              scrape_interval: 30s
              static_configs:
                - targets: ["argo-rollouts-metrics.argo-rollouts.svc.cluster.local:8090"]
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: "rollout_.*|argo_rollouts_.*|analysis_run_.*|experiment_.*"
                  action: keep

            - job_name: "kube-state-metrics-rollouts"
              scrape_interval: 30s
              static_configs:
                - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: "kube_pod_labels|kube_pod_status_phase|kube_pod_container_.*"
                  action: keep
                - source_labels: [label_rollouts_pod_template_hash]
                  regex: ".+"
                  action: keep

    processors:
      batch:
        timeout: 10s
        send_batch_size: 10000
        send_batch_max_size: 10000
      resource:
        attributes:
          - key: service.name
            value: "argo-rollouts"
            action: upsert
          - key: k8s.cluster.name
            value: "YOUR_CLUSTER_NAME"
            action: upsert
          - key: deployment.environment
            value: "production"
            action: upsert

    exporters:
      otlp/last9:
        endpoint: "YOUR_LAST9_OTLP_ENDPOINT"
        headers:
          "Authorization": "YOUR_LAST9_AUTH_HEADER"
        compression: gzip

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [otlp/last9]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.144.0
          args: ["--config=/etc/otel/config.yaml"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-metrics-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-metrics-reader
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
