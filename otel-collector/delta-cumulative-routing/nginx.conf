events {
    worker_connections 1024;
}

http {
    # Round-robin across two collector replicas — simulates K8s Service
    upstream otel_collectors {
        server collector-1:4318;
        server collector-2:4318;
    }

    server {
        listen 4318;

        location / {
            proxy_pass         http://otel_collectors;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
            # Force short keepalive so round-robin actually distributes across pods
            keepalive_requests 2;
        }
    }
}
