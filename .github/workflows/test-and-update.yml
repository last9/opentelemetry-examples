name: Test and Update Package Matrix

on:
  push:
    branches: [ main, master, otel-package-matrix ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python versions
        uses: actions/setup-python@v4
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run Django tests and capture packages
        run: |
          # Clean any previous package data
          rm -f PACKAGES.txt
          
          # Test all Python/Django combinations
          # Python 3.8/3.9: Django 3.2, 4.2 (Django 5.x requires Python 3.10+)
          # Python 3.10/3.11/3.12: Django 3.2, 4.2, 5.0, 5.1
          
          tox -e py38-django32,py38-django42,py39-django32,py39-django42,py310-django32,py310-django42,py310-django50,py310-django51,py311-django32,py311-django42,py311-django50,py311-django51,py312-django32,py312-django42,py312-django50,py312-django51
          
          # Convert captured package data to clean markdown format
          echo "# OpenTelemetry Package Matrix" > PACKAGE_MATRIX.md
          echo "" >> PACKAGE_MATRIX.md
          echo "This matrix shows OpenTelemetry packages tested in each environment." >> PACKAGE_MATRIX.md
          echo "" >> PACKAGE_MATRIX.md
          echo "## Summary" >> PACKAGE_MATRIX.md
          echo "" >> PACKAGE_MATRIX.md
          echo "| Environment | Package Count | Details |" >> PACKAGE_MATRIX.md
          echo "|-------------|---------------|---------|" >> PACKAGE_MATRIX.md
          
          if [ -f PACKAGES.txt ]; then
            # First pass: collect data for summary table
            current_env=""
            packages=()
            summary_data=""
            while IFS= read -r line; do
              if [[ $line == "=== "* ]]; then
                # Save previous environment if exists
                if [[ -n "$current_env" && ${#packages[@]} -gt 0 ]]; then
                  python_ver=$(echo "$current_env" | sed 's/py\([0-9]\)\([0-9]\+\)-.*/Python \1.\2/')
                  django_ver=$(echo "$current_env" | sed 's/.*django\([0-9]\)\([0-9]\)/Django \1.\2/')
                  env_name="$python_ver + $django_ver"
                  anchor=$(echo "$env_name" | tr '[:upper:]' '[:lower:]' | tr ' +.' '-')
                  count=${#packages[@]}
                  summary_data="$summary_data| $env_name | $count packages | [View Details](#$anchor) |\n"
                fi
                # Start new environment
                current_env=$(echo "$line" | sed 's/=== //g' | sed 's/ ===//g')
                packages=()
              elif [[ $line == opentelemetry* ]]; then
                packages+=("$line")
              fi
            done < PACKAGES.txt
            
            # Don't forget the last environment for summary
            if [[ -n "$current_env" && ${#packages[@]} -gt 0 ]]; then
              python_ver=$(echo "$current_env" | sed 's/py\([0-9]\)\([0-9]\+\)-.*/Python \1.\2/')
              django_ver=$(echo "$current_env" | sed 's/.*django\([0-9]\)\([0-9]\)/Django \1.\2/')
              env_name="$python_ver + $django_ver"
              anchor=$(echo "$env_name" | tr '[:upper:]' '[:lower:]' | tr ' +.' '-')
              count=${#packages[@]}
              summary_data="$summary_data| $env_name | $count packages | [View Details](#$anchor) |\n"
            fi
            
            # Add summary table
            echo -e "$summary_data" >> PACKAGE_MATRIX.md
            echo "" >> PACKAGE_MATRIX.md
            echo "## Detailed Package Lists" >> PACKAGE_MATRIX.md
            
            # Second pass: generate detailed sections
            current_env=""
            packages=()
            while IFS= read -r line; do
              if [[ $line == "=== "* ]]; then
                # Save previous environment if exists
                if [[ -n "$current_env" && ${#packages[@]} -gt 0 ]]; then
                  python_ver=$(echo "$current_env" | sed 's/py\([0-9]\)\([0-9]\+\)-.*/Python \1.\2/')
                  django_ver=$(echo "$current_env" | sed 's/.*django\([0-9]\)\([0-9]\)/Django \1.\2/')
                  echo "" >> PACKAGE_MATRIX.md
                  echo "### $python_ver + $django_ver" >> PACKAGE_MATRIX.md
                  echo "" >> PACKAGE_MATRIX.md
                  for pkg in "${packages[@]}"; do
                    pkg_name=$(echo "$pkg" | cut -d'=' -f1)
                    pkg_version=$(echo "$pkg" | cut -d'=' -f3)
                    echo "- \`$pkg_name\` ($pkg_version)" >> PACKAGE_MATRIX.md
                  done
                fi
                # Start new environment
                current_env=$(echo "$line" | sed 's/=== //g' | sed 's/ ===//g')
                packages=()
              elif [[ $line == opentelemetry* ]]; then
                packages+=("$line")
              fi
            done < PACKAGES.txt
            
            # Don't forget the last environment for details
            if [[ -n "$current_env" && ${#packages[@]} -gt 0 ]]; then
              python_ver=$(echo "$current_env" | sed 's/py\([0-9]\)\([0-9]\+\)-.*/Python \1.\2/')
              django_ver=$(echo "$current_env" | sed 's/.*django\([0-9]\)\([0-9]\)/Django \1.\2/')
              echo "" >> PACKAGE_MATRIX.md
              echo "### $python_ver + $django_ver" >> PACKAGE_MATRIX.md
              echo "" >> PACKAGE_MATRIX.md
              for pkg in "${packages[@]}"; do
                pkg_name=$(echo "$pkg" | cut -d'=' -f1)
                pkg_version=$(echo "$pkg" | cut -d'=' -f3)
                echo "- \`$pkg_name\` ($pkg_version)" >> PACKAGE_MATRIX.md
              done
            fi
          fi

      - name: Update README with package matrix
        run: |
          if [ -f PACKAGE_MATRIX.md ]; then
            echo "" >> README.md
            cat PACKAGE_MATRIX.md >> README.md
            echo "" >> README.md
            echo "*Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> README.md
          fi

      - name: Commit changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md PACKAGE_MATRIX.md
          if ! git diff --staged --quiet; then
            git commit -m "Update OpenTelemetry package matrix [skip ci]"
            git push
          fi