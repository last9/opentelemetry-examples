name: Test Matrix and Update README

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.7, 3.8, 3.9, 3.10, 3.11, 3.12]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run tox tests
        run: tox -e py${{ matrix.python-version }}-django32,py${{ matrix.python-version }}-django41,py${{ matrix.python-version }}-django50,py${{ matrix.python-version }}-django51

      - name: Generate package matrix
        if: matrix.python-version == '3.11'
        run: |
          python python/django/list_otel_packages.py > package_matrix.txt
          cat package_matrix.txt

      - name: Show list_otel_packages.py contents
        if: matrix.python-version == '3.11'
        run: |
          cat python/django/list_otel_packages.py

      - name: Show generated package_matrix.txt
        if: matrix.python-version == '3.11'
        run: |
          cat package_matrix.txt

      - name: Update README with matrix
        if: matrix.python-version == '3.11'
        run: |
          python python/django/update_readme_matrix.py package_matrix.txt

      - name: Check for changes
        if: matrix.python-version == '3.11'
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'push' && matrix.python-version == '3.11'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update OpenTelemetry package matrix [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Clean up
        if: matrix.python-version == '3.11'
        run: |
          rm -f package_matrix.txt 