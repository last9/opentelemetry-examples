name: Test Matrix and Update README

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.11]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run tox tests
        run: |
          if [[ "${{ matrix.python-version }}" == "3.8" || "${{ matrix.python-version }}" == "3.9" ]]; then
            envs="py${{ matrix.python-version }}-django32,py${{ matrix.python-version }}-django42"
          else
            envs="py${{ matrix.python-version }}-django32,py${{ matrix.python-version }}-django42,py${{ matrix.python-version }}-django50,py${{ matrix.python-version }}-django51"
          fi
          tox -e $envs
          
          # Capture package versions for matrix generation
          mkdir -p package_data
          cd python/django/mysite
          echo "Looking for tox environments in: $(pwd)/.tox"
          ls -la .tox/ || echo "No .tox directory found"
          for env in $(echo $envs | tr ',' ' '); do
            echo "Checking environment: $env"
            if [ -f ".tox/$env/bin/pip" ]; then
              echo "Found pip for $env, capturing packages..."
              echo "=== $env ===" >> ../../../package_data/py${{ matrix.python-version }}.txt
              .tox/$env/bin/pip list --format=freeze | grep "^opentelemetry" >> ../../../package_data/py${{ matrix.python-version }}.txt
              echo "" >> ../../../package_data/py${{ matrix.python-version }}.txt
            else
              echo "No pip found at .tox/$env/bin/pip"
              ls -la .tox/$env/bin/ 2>/dev/null || echo "Directory .tox/$env/bin/ does not exist"
            fi
          done
          echo "Package data file contents:"
          cat ../../../package_data/py${{ matrix.python-version }}.txt 2>/dev/null || echo "No package data file created"
          cd ../../..

      - name: Upload package data
        uses: actions/upload-artifact@v4
        with:
          name: package-data-py${{ matrix.python-version }}
          path: package_data/py${{ matrix.python-version }}.txt
          if-no-files-found: ignore

  update-readme:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download all package data
        uses: actions/download-artifact@v4
        with:
          pattern: package-data-py*
          path: all_package_data
          merge-multiple: true

      - name: Generate package matrix
        run: |
          python3 python/django/generate_matrix.py

      - name: Show list_otel_packages.py contents
        run: |
          cat python/django/list_otel_packages.py

      - name: Show generated package_matrix.txt
        run: |
          cat package_matrix.txt

      - name: Update README with matrix
        run: |
          python python/django/update_readme_matrix.py package_matrix.txt

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update OpenTelemetry package matrix [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Clean up
        run: |
          rm -f package_matrix.txt 