name: Test Matrix and Update README

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run tox tests
        run: |
          # Convert Python version format (3.8 -> 38, 3.10 -> 310)
          py_ver=$(echo "${{ matrix.python-version }}" | sed 's/\.//')
          
          if [[ "${{ matrix.python-version }}" == "3.9" ]]; then
            # Python 3.9: Only Django 3.2, 4.2 (Django 5.x requires Python 3.10+)
            envs="py${py_ver}-django32,py${py_ver}-django42"
          else
            # Python 3.10/3.11/3.12: Django 3.2, 4.2, 5.0, 5.1
            envs="py${py_ver}-django32,py${py_ver}-django42,py${py_ver}-django50,py${py_ver}-django51"
          fi
          # Run tox tests
          tox -e $envs
          
          # Capture actual OpenTelemetry packages for each environment
          mkdir -p package_data
          echo "| Environment | OTEL Packages |" > package_data/py${py_ver}.txt
          echo "|------------|--------------|" >> package_data/py${py_ver}.txt
          
          # For each environment tested, capture the actual installed packages
          for env in $(echo $envs | tr ',' ' '); do
            # Get the virtual environment path for this tox environment
            venv_path=".tox/$env"
            if [ -d "$venv_path" ]; then
              # List OpenTelemetry packages from the tox environment
              packages=$($venv_path/bin/pip list --format=freeze | grep "^opentelemetry" | tr '\n' ', ' | sed 's/,$//')
              if [ -n "$packages" ]; then
                echo "| $env | $packages |" >> package_data/py${py_ver}.txt
              else
                echo "| $env | No OpenTelemetry packages found |" >> package_data/py${py_ver}.txt
              fi
            else
              echo "| $env | Environment not found |" >> package_data/py${py_ver}.txt
            fi
          done

      - name: Upload package data
        uses: actions/upload-artifact@v4
        with:
          name: package-data-py${{ matrix.python-version }}
          path: package_data/py$(echo "${{ matrix.python-version }}" | sed 's/\.//').txt
          if-no-files-found: ignore

  update-readme:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download all package data
        uses: actions/download-artifact@v4
        with:
          pattern: package-data-py*
          path: all_package_data
          merge-multiple: true

      - name: Generate package matrix
        run: |
          python3 python/django/generate_matrix.py

      - name: Show list_otel_packages.py contents
        run: |
          cat python/django/list_otel_packages.py

      - name: Show generated package_matrix.txt
        run: |
          cat package_matrix.txt

      - name: Update README with matrix
        run: |
          python python/django/update_readme_matrix.py package_matrix.txt

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update OpenTelemetry package matrix [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Clean up
        run: |
          rm -f package_matrix.txt 